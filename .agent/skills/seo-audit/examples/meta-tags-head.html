<!-- 
Contoh: Meta Tags Lengkap untuk SEO & Social Media
Aturan Elite:
- Title dan Description adalah harga mati.
- Open Graph (og:) penting untuk WhatsApp/Facebook.
- Twitter Cards (twitter:) penting untuk Twitter/X.
-->

<head>
  <!-- Pengaturan Dasar (Wajib) -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Primary Meta Tags -->
  <title>Elite SEO Service | Solusi Visibilitas Digital</title>
  <meta name="title" content="Elite SEO Service | Solusi Visibilitas Digital">
  <meta name="description" content="Tingkatkan peringkat pencarian web Anda dengan standar Elite. Bebas Div-Soup, cepat, dan teroptimasi secara semantik.">
  <meta name="keywords" content="SEO, agen SEO, optimasi web, HTML5 semantik">
  <meta name="author" content="Elite Agent">

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.websiteanda.com/">
  <meta property="og:title" content="Elite SEO Service | Solusi Visibilitas Digital">
  <meta property="og:description" content="Tingkatkan peringkat pencarian web Anda dengan standar Elite. Bebas Div-Soup, cepat, dan teroptimasi secara semantik.">
  <meta property="og:image" content="https://www.websiteanda.com/assets/og-image.jpg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://www.websiteanda.com/">
  <meta property="twitter:title" content="Elite SEO Service | Solusi Visibilitas Digital">
  <meta property="twitter:description" content="Tingkatkan peringkat pencarian web Anda dengan standar Elite. Bebas Div-Soup, cepat, dan teroptimasi secara semantik.">
  <meta property="twitter:image" content="https://www.websiteanda.com/assets/og-image.jpg">
  
  <!-- Favicon & Canonical -->
  <link rel="canonical" href="https://www.websiteanda.com/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
