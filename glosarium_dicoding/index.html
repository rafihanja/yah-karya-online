<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glosarium Dicoding - Data Science & Microsoft Fabric</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-card: #1e293b;
      --bg-card-hover: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #38bdf8;
      --accent-hover: #0284c7;
      --accent-bg: rgba(56, 189, 248, 0.15);
      --border-color: #334155;
      --success-color: #4ade80;
      --highlight-bg: #fbbf24;
      --highlight-text: #0f172a;
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-card: #ffffff;
      --bg-card-hover: #f1f5f9;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --accent-color: #0284c7;
      --accent-hover: #0369a1;
      --accent-bg: rgba(2, 132, 199, 0.15);
      --border-color: #e2e8f0;
      --success-color: #16a34a;
      --highlight-bg: #f59e0b;
      --highlight-text: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      width: 440px;
      max-width: 100vw;
      min-height: 520px;
      padding: 14px;
      transition: background-color 0.2s, color 0.2s;
    }

    .container {
      width: 100%;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }

    .title-area h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent-color);
    }

    .title-area p {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .header-controls {
      display: flex;
      gap: 6px;
    }

    .btn-toggle {
      background: var(--bg-card);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-toggle:hover {
      background: var(--bg-card-hover);
    }

    .search-box {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-primary);
      padding-bottom: 10px;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent-color);
    }

    .alpha-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
    }

    .alpha-btn {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-main);
      font-weight: 600;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
    }

    .alpha-btn:hover, .alpha-btn.active {
      background: var(--accent-color);
      color: #ffffff;
      border-color: var(--accent-color);
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .term-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .letter-group {
      margin-top: 4px;
    }

    .letter-header {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 6px;
      padding-bottom: 2px;
      border-bottom: 2px solid var(--accent-bg);
      display: inline-block;
    }

    .term-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .term-card:hover {
      border-color: var(--accent-color);
    }

    .term-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .term-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: var(--accent-bg);
      color: var(--accent-color);
      border-color: var(--accent-color);
    }

    .action-btn.is-fav {
      background: var(--accent-bg);
      color: var(--accent-color);
      border-color: var(--accent-color);
    }

    .term-def {
      font-size: 0.835rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    mark {
      background-color: var(--highlight-bg);
      color: var(--highlight-text);
      padding: 0 2px;
      border-radius: 2px;
    }

    .no-results {
      text-align: center;
      padding: 30px 10px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success-color);
      color: #ffffff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      display: none;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="title-area">
        <h1>Glosarium Dicoding</h1>
        <p>Data Science & Microsoft Fabric</p>
      </div>
      <div class="header-controls">
        <button class="btn-toggle" id="btnFavoriteFilter">Favorit (0)</button>
        <button class="btn-toggle" id="btnThemeToggle">Mode Terang</button>
      </div>
    </header>

    <div class="search-box">
      <input type="text" id="searchInput" class="search-input" placeholder="Cari istilah... (contoh: JSON, Lakehouse, API)" autofocus autocomplete="off">
    </div>

    <div class="alpha-filter" id="alphaFilter"></div>

    <div class="stats-bar">
      <span id="statsCount">Menampilkan 0 istilah</span>
      <span id="activeFilterText">Semua Istilah</span>
    </div>

    <div id="termList" class="term-list"></div>
  </div>

  <div id="toast" class="toast">Definisi berhasil disalin!</div>

  <script src="popup.js"></script>
</body>
</html>
