name: Agent Health Check

on:
  push:
    branches: [master]
    paths:
      - '.agent/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'PROJECT_MEMORY.md'
  pull_request:
    branches: [master]
    paths:
      - '.agent/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'PROJECT_MEMORY.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agent-validation:
    name: Agent Governance Validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Generate Skill Index
        run: node .agent/scripts/generate-skill-index.mjs

      - name: Validate Agent Skills
        run: node .agent/scripts/validate-agent-skills.mjs

      - name: Agent Doctor Health Check
        run: node .agent/scripts/agent-doctor.mjs

      - name: Deep Skill Audit
        run: node .agent/scripts/deep-skill-audit.mjs

      - name: Audit Skill Quality
        run: node .agent/scripts/audit-skill-quality.mjs

      - name: Self-Review Validator (Agent Scope)
        run: node .agent/scripts/self-review-validator.mjs --scope agent

      - name: Verify Router-Skill Alignment
        run: |
          node -e "
          const fs = require('fs');
          const router = JSON.parse(fs.readFileSync('.agent/skill-router.json', 'utf8'));
          const skills = fs.readdirSync('.agent/skills').filter(d =>
            fs.existsSync('.agent/skills/' + d + '/SKILL.md')
          );
          const routerSkills = new Set();
          router.routes.forEach(r => {
            if (r.skillName) routerSkills.add(r.skillName);
            if (r.skills) r.skills.forEach(s => routerSkills.add(s));
          });
          const orphans = skills.filter(s => !routerSkills.has(s));
          console.log('Skills in folder:', skills.length);
          console.log('Skills in router:', routerSkills.size);
          console.log('Orphan skills:', orphans.length);
          if (orphans.length > 0) {
            console.error('FAIL: Orphan skills detected:', orphans.join(', '));
            process.exit(1);
          }
          console.log('ALL SKILLS WIRED');
          "

      - name: Verify No Hardcoded Secrets
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const secretPatterns = [
            /api[_-]?key\s*[:=]\s*['\"][a-zA-Z0-9]{20,}/i,
            /password\s*[:=]\s*['\"][^\s]{8,}/i,
            /secret\s*[:=]\s*['\"][a-zA-Z0-9]{20,}/i,
            /bearer\s+[a-zA-Z0-9._-]{20,}/i
          ];
          const excludeDirs = ['node_modules', '.git', '.agent/memory'];
          let found = 0;
          function scan(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (!excludeDirs.includes(entry.name)) scan(full);
              } else if (/\.(js|jsx|ts|tsx|json|md|html)$/.test(entry.name)) {
                const content = fs.readFileSync(full, 'utf8');
                for (const pattern of secretPatterns) {
                  if (pattern.test(content)) {
                    console.error('SECRET DETECTED:', full);
                    found++;
                  }
                }
              }
            }
          }
          scan('.');
          if (found > 0) {
            console.error('FAIL: ' + found + ' potential secret(s) detected');
            process.exit(1);
          }
          console.log('No hardcoded secrets detected');
          "

      - name: Verify PROJECT_MEMORY.md Exists
        run: |
          if [ -f "PROJECT_MEMORY.md" ]; then
            echo "PROJECT_MEMORY.md exists"
          else
            echo "FAIL: PROJECT_MEMORY.md missing"
            exit 1
          fi

      - name: Landing Page Test (dado-4-7.html)
        run: node test_landing_page.mjs

      - name: Verify Governance Markers
        run: |
          node -e "
          const fs = require('fs');
          const markers = [
            'FAIL_CLOSED_GOVERNANCE',
            'EVERY_OUTPUT_SKILL_DISCLOSURE',
            'MANDATORY_SKILL_INDEX'
          ];
          const files = {
            'AGENTS.md': fs.readFileSync('AGENTS.md', 'utf8'),
            'CLAUDE.md': fs.readFileSync('CLAUDE.md', 'utf8')
          };
          let pass = true;
          for (const [file, content] of Object.entries(files)) {
            for (const marker of markers) {
              if (!content.includes(marker)) {
                console.error('FAIL: ' + marker + ' missing from ' + file);
                pass = false;
              }
            }
          }
          if (!pass) process.exit(1);
          console.log('All governance markers present in AGENTS.md and CLAUDE.md');
          "

      - name: Report Summary
        if: always()
        run: |
          echo "## Agent Health Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Skill Index Generation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Skills Validation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Doctor | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Deep Skill Audit | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Skill Quality Audit | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Self-Review Validator | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Router-Skill Alignment | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Landing Page Test (63 checks) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| No Hardcoded Secrets | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Governance Markers | ✅ |" >> $GITHUB_STEP_SUMMARY
